<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒柠可爱捏 ❤</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  .bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    font-size: 24px;
    opacity: 0.07;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(105vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.07; }
    90%  { opacity: 0.07; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  @keyframes floatUpAlt {
    0%   { transform: translateY(105vh) rotate(0deg) scale(0.5); opacity: 0; }
    15%  { opacity: 0.05; }
    85%  { opacity: 0.05; }
    100% { transform: translateY(-10vh) rotate(-270deg) scale(1.2); opacity: 0; }
  }

  .main-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .image-wrapper {
    position: relative;
    width: min(420px, 80vw);
    aspect-ratio: 3 / 4;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 0 60px rgba(180, 150, 210, 0.3),
      0 0 120px rgba(180, 150, 210, 0.12),
      0 24px 60px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .image-wrapper:hover {
    transform: scale(1.02);
    box-shadow:
      0 0 80px rgba(200, 170, 230, 0.4),
      0 0 160px rgba(200, 170, 230, 0.18),
      0 28px 70px rgba(0, 0, 0, 0.6);
  }

  .image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: linear-gradient(160deg, #1e1e38 0%, #2a2545 40%, #1e1e38 100%);
    display: block;
  }

  .image-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(160deg, #1e1e38 0%, #2a2545 40%, #1e1e38 100%);
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .image-placeholder.hidden { opacity: 0; }

  .image-placeholder .chibi-silhouette {
    font-size: 120px;
    opacity: 0.25;
    filter: blur(2px);
  }

  .caption {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    color: #e8d5f5;
    text-align: center;
    letter-spacing: 6px;
    text-shadow:
      0 0 20px rgba(200, 160, 230, 0.6),
      0 0 60px rgba(200, 160, 230, 0.3),
      0 0 100px rgba(180, 140, 210, 0.2),
      0 2px 4px rgba(0, 0, 0, 0.6);
    animation: textGlow 2s ease-in-out infinite alternate;
  }

  @keyframes textGlow {
    0%   { text-shadow: 0 0 20px rgba(200,160,230,0.5), 0 0 60px rgba(200,160,230,0.25), 0 2px 4px rgba(0,0,0,0.6); }
    100% { text-shadow: 0 0 35px rgba(220,180,245,0.8), 0 0 90px rgba(220,180,245,0.4), 0 2px 4px rgba(0,0,0,0.6); }
  }


  .heart {
    position: absolute;
    animation: heartPop 1.2s ease-out forwards;
    opacity: 0;
    font-size: 20px;
    pointer-events: none;
  }

  @keyframes heartPop {
    0%   { transform: translate(0, 0) scale(0); opacity: 1; }
    30%  { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
  }

  @media (max-width: 480px) {
    .image-wrapper { width: 88vw; }
    .caption { letter-spacing: 3px; }
  }
</style>
</head>

<script>
// 背景漂浮粒子
(function() {
  const c = document.getElementById('particles');
  const e = ['🌸','💜','🎀','✨','💫','🌙','⭐','💎','🦋','💿','🎵'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('span');
    el.className = 'particle';
    el.textContent = e[Math.floor(Math.random() * e.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (16 + Math.random() * 32) + 'px';
    el.style.animationDuration = (8 + Math.random() * 16) + 's';
    el.style.animationDelay = Math.random() * 12 + 's';
    el.style.animationName = Math.random() > 0.5 ? 'floatUp' : 'floatUpAlt';
    c.appendChild(el);
  }
})();

let audioCtx = null;

// 可爱点击音效 (Web Audio API 合成)
function playClickSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);

    // 两个可爱的高频音符，模拟 "叮~咚~"
    [800, 1200].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.08);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + i * 0.08 + 0.15);
      osc.connect(g);
      osc.start(t + i * 0.08);
      osc.stop(t + i * 0.08 + 0.2);
    });
  } catch(e) {}
}

// 点击图片冒爱心 + 播放语音
(function() {
  const w = document.getElementById('imageWrapper');
  const hearts = ['💕','💜','💗','💝','🩷','💖'];
  w.addEventListener('click', function(e) {
    // 爱心特效
    const rect = w.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = hearts[i];
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      h.style.setProperty('--dx', (Math.random() - 0.5) * 80 + 'px');
      h.style.setProperty('--dy', (Math.random() - 0.8) * 80 + 'px');
      h.style.animationDelay = i * 0.06 + 's';
      w.appendChild(h);
      h.addEventListener('animationend', () => h.remove());
    }
    // 可爱点击音效
    playClickSound();
  });
})();
</script>
